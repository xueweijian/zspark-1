version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zspark
      POSTGRES_PASSWORD: zspark
      POSTGRES_DB: zspark
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  server:
    build: .
    environment:
      DATABASE_URL: postgres://zspark:zspark@postgres:5432/zspark
      REDIS_URL: redis://redis:6379
      KRB_SERVICE: HTTP/zspark.corp.local
    ports: ["8787:8787"]
    depends_on: [postgres, redis]
volumes:
  pgdata: {}
