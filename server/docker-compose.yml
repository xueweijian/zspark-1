services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zspark
      POSTGRES_PASSWORD: zspark
      POSTGRES_DB: zspark
    ports: ["55432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    expose: ["6379"]
  server:
    build: .
    environment:
      DATABASE_URL: postgres://zspark:zspark@postgres:5432/zspark
      REDIS_URL: redis://redis:6379
      ZSPARK_TENANT_ID: ${ZSPARK_TENANT_ID:-}
      ZSPARK_CLIENT_ID: ${ZSPARK_CLIENT_ID:-}
      ZSPARK_AUTHORITY: ${ZSPARK_AUTHORITY:-}
    ports: ["8787:8787"]
    depends_on: [postgres, redis]
volumes:
  pgdata: {}
