name: build-codex-windows

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/build-codex-windows.yml'
      - 'codex-rs/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_PROFILE_RELEASE_LTO: 'off'
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: '16'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@a0b273b48ed29de4470960879e8381ff45632f26
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: codex-rs
          key: build-codex-windows-v1

      - name: Build codex.exe
        shell: bash
        run: cargo build --release --bin codex

      - name: Stage codex.exe
        shell: bash
        run: |
          mkdir -p staged
          cp "target/release/codex.exe" "staged/codex.exe"
          ls -lh staged

      - name: Upload codex.exe
        uses: actions/upload-artifact@v4
        with:
          name: codex-windows-x64
          path: codex-rs/staged/codex.exe
          retention-days: 14
          if-no-files-found: error
